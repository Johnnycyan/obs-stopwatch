<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Stopwatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link id="fontLink" rel="stylesheet">
</head>
<body>
    <div id="stopwatch-wrapper">
        <div id="stopwatch">00:00:00</div>
        <div id="stopwatch-glow" aria-hidden="true">00:00:00</div>
    </div>
    <div id="buttons">
        <button id="startStop">Start/Stop</button>
        <button id="reset">Reset</button>
    </div>
    <div id="settings">
        <div id="timeInputs">
            <div class="time-input">
                <label for="hours">Hours</label>
                <input type="text" id="hours" disabled>
            </div>
            <div class="time-input">
                <label for="minutes">Minutes</label>
                <input type="text" id="minutes" disabled>
            </div>
            <div class="time-input">
                <label for="seconds">Seconds</label>
                <input type="text" id="seconds" disabled>
            </div>
        </div>
        <div id="fontSettings">
            <div>
                <label for="googleFontsImport">Google Fonts @import</label>
                <input type="text" id="googleFontsImport" disabled>
            </div>
            <div>
                <label for="fontName">Font Name</label>
                <input type="text" id="fontName" disabled>
            </div>
        </div>
        <div id="animGradientSettings">
            <div class="gradient-row">
                <label for="animGradient">Animated Gradient</label>
                <input type="checkbox" id="animGradient" disabled>
            </div>
            <div class="gradient-row">
                <label for="gradientColor1">Color 1</label>
                <input type="text" id="gradientColor1" value="#00ff00" placeholder="#00ff00" disabled>
                <label for="gradientColor2">Color 2</label>
                <input type="text" id="gradientColor2" value="#00d9ff" placeholder="#00d9ff" disabled>
            </div>
            <div class="gradient-row">
                <label for="gradientSpeed">Speed (s)</label>
                <input type="number" id="gradientSpeed" value="10" min="1" max="60" disabled>
            </div>
            <div class="gradient-row">
                <label for="gradientGlow">Glow Opacity</label>
                <input type="range" id="gradientGlow" min="0" max="10" step="1" value="2" disabled>
            </div>
        </div>
        <div id="obsWsSettings">
            <div class="obs-row">
                <label for="obsWsEnabled">OBS WebSocket Control</label>
                <input type="checkbox" id="obsWsEnabled">
            </div>
            <div class="obs-row">
                <label for="obsWsHost">Host</label>
                <input type="text" id="obsWsHost" value="localhost">
                <label for="obsWsPort">Port</label>
                <input type="text" id="obsWsPort" value="4455">
            </div>
            <div class="obs-row">
                <label for="obsWsPassword">Password</label>
                <input type="password" id="obsWsPassword" placeholder="OBS WebSocket password">
            </div>
            <div class="obs-row">
                <label for="obsWsRealm">Realm</label>
                <input type="text" id="obsWsRealm" value="obs-stopwatch">
                <button id="obsWsConnect" type="button">Connect</button>
                <span id="obsWsStatus" aria-live="polite">Disconnected</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
